<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Weekly FR</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131a;
            --accent: #7c3aed;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: #1e1e2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { max-width: 600px; padding: 40px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: var(--muted); margin-bottom: 40px; }
        .newsletter-list { list-style: none; }
        .newsletter-list li { margin-bottom: 12px; }
        .newsletter-list a {
            display: block;
            padding: 16px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
        }
        .newsletter-list a:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Music Weekly FR</h1>
        <p class="subtitle">Newsletter hebdomadaire des charts musicaux francais</p>
        <ul class="newsletter-list">
            <li>
                <a href="newsletter_2026-03-20.html">
                    Semaine du 13/03 au 20/03/2026
                    <span class="badge">Derniere</span>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
